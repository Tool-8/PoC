services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poc_app
    working_dir: /var/www/html
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
    volumes:
      - ./src:/var/www/html
      - ./src/storage:/var/www/html/storage
      - vendor:/var/www/html/vendor
      - laravel_cache:/var/www/html/bootstrap/cache
    command: ["/usr/local/bin/app-entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.25-alpine
    container_name: poc_web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./src/storage:/var/www/html/storage
      - vendor:/var/www/html/vendor
      - laravel_cache:/var/www/html/bootstrap/cache
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: poc_db
    environment:
      POSTGRES_DB: poc
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: poc
    ports:
      - "54320:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc -d poc"]
      interval: 5s
      timeout: 5s
      retries: 20

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: poc_node
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - app

volumes:
  pgdata:
  laravel_cache:
  vendor:
  node_modules: